services:
  postgres:
    image: postgres:16-alpine
    container_name: jugaad-postgres
    environment:
      POSTGRES_DB: jugaad_nights
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jugaad-network

  redis:
    image: redis:7-alpine
    container_name: jugaad-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jugaad-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jugaad-nights-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: jugaad_nights
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
      PORT: 3000
      API_URL: http://localhost:3000
      API_PREFIX: /api
      CORS_ORIGIN: "*"
      LOG_LEVEL: debug
    ports:
      - "3000:3000"
    networks:
      - jugaad-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      start_period: 90s
      retries: 5

volumes:
  postgres_data:

networks:
  jugaad-network:
    driver: bridge
